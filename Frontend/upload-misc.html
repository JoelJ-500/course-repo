<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourseRepo - File Upload</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Adding some basic spacing for the new fields */
    .row { margin-bottom: 15px; }
    .label-right { width: 120px; font-weight: bold; }
    select, input, textarea { padding: 8px; width: 100%; max-width: 300px; border: 1px solid #ccc; border-radius: 4px; }
    textarea { resize: vertical; height: 60px; }
  </style>
</head>
<body>
  <main class="container" style="display:flex; justify-content:center; padding-top: 50px;">
    <div class="modal" style="position:relative; width: 100%; max-width: 500px; border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
      <div class="topline" style="position:absolute; right:10px; top:10px;">
        <a class="close" href="course.html" aria-label="Close" style="text-decoration:none; font-size: 24px; color: #333;">&times;</a>
      </div>
      <div class="muted" style="text-align:center; margin-bottom:20px; font-weight: bold; color: #666;">Upload new file</div>

      <form id="uploadForm">
        <input type="file" id="fileInput" name="file" style="display:none;" required />
        
        <input type="hidden" name="course_id" value="1" />

        <div class="row">
          <div class="label-right">File:</div>
          <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn" type="button" onclick="document.getElementById('fileInput').click();" style="padding:8px 12px; cursor: pointer;">
              Choose File
            </button>
            <span id="fileNameDisplay" style="font-size: 0.9em; color: #555;">No file chosen</span>
          </div>
        </div>

        <div class="row">
          <div class="label-right">Display Name:</div>
          <input type="text" name="display_name" placeholder="e.g. Inversions Script" required />
        </div>

        <div class="row">
          <div class="label-right">Description:</div>
          <textarea name="description" placeholder="Something about this file..."></textarea>
        </div>

        <div class="row">
          <div class="label-right">Category:</div>
          <select name="category" required>
            <option value="outline">Outline</option>
            <option value="midterm_real">Midterm (Real)</option>
            <option value="midterm_mock">Midterm (Mock)</option>
            <option value="final_real">Final (Real)</option>
            <option value="final_mock">Final (Mock)</option>
            <option value="misc">Miscellaneous</option>
          </select>
        </div>

        <div class="upload-btn" style="text-align: center; margin-top: 20px;">
          <button class="btn" type="submit" style="min-width:160px; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
            UPLOAD
          </button>
        </div>
      </form>
    </div>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const uploadForm = document.getElementById('uploadForm');

    // Update the UI to show which file was selected
    fileInput.addEventListener('change', () => {
      fileNameDisplay.textContent = fileInput.files[0] ? fileInput.files[0].name : "No file chosen";
    });

    // Handle the Form Submission
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault(); // Stop the page from refreshing

      const formData = new FormData(uploadForm);

      try {
        const response = await fetch('http://localhost:3000/files/upload', {
          method: 'POST',
          body: formData // No headers needed, fetch sets 'multipart/form-data' automatically
        });

        if (response.ok) {
          const result = await response.json();
          alert('Upload Successful!');
          console.log(result);
        } else {
          alert('Upload failed: ' + response.statusText);
        }
      } catch (error) {
        console.error('Error uploading file:', error);
        alert('Error connecting to server. Make sure your backend is running.');
      }
    });
  </script>
</body>
</html>
