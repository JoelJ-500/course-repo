<!DOCTYPE html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourseRepo - Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="nav">
        <nav class="left">
        <a class="nav-item" href="index.html" aria-label="Home">
            <span class="icon outline" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.8V21h14V9.8"/></svg>
            </span>
            <span class="label">Home</span>
        </a>

        <a class="nav-item" href="saved.html">
            <span class="icon outline" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
            </span>
            <span class="label">Saved content</span>
        </a>

        <a class="nav-item" href="add-course.html">
            <span class="icon green" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M10.5 3h3v18h-3z"/><path d="M3 10.5h18v3H3z"/></svg>
            </span>
            <span class="label">Create new course</span>
        </a>
        </nav>

        <div class="right">
        <span class="user" data-user>null</span>
        <a href="login.html" onclick="localStorage.removeItem('cr_user');">Sign out</a>
        </div>
    </header>

    <div style="text-align: center;" class="admin-panel">
        <h1>Admin Controls</h1>

        <div class="input-group">
            <label>Delete Course:</label>
            <input type="text" id="courseId" placeholder="Enter Course ID">
            <button onclick="handleDelete('course')">Submit</button>
        </div>

        <br>

        <div class="input-group">
            <label>Delete File:</label>
            <input type="text" id="fileId" placeholder="Enter File ID">
            <button onclick="handleDelete('file')">Submit</button>
        </div>

        <br>

    </div>

    <script>
        async function handleDelete(type) {
            const inputId = type === 'course' ? 'courseId' : 'fileId';
            const idValue = document.getElementById(inputId).value;

            if (!idValue) {
                alert(`Please enter a ${type} ID.`);
                return;
            }

            if (!confirm(`Are you sure you want to delete this ${type}?`)) return;

            let url = `http://localhost:3000/courses/${idValue}`;

            if (type === 'file') {
                url =  `http://localhost:3000/files/${idValue}`;
            }
                

            try {
                const response = await fetch(url, {
                    method: 'DELETE',
                    credentials: "include"
                });

                const data = await response.json().catch(() => null); 
                const message = data.message;

                if (response.ok) {
                    alert(`Success: ${message}`);
                    
                    document.getElementById(inputId).value = ''; 
                } else {
                    alert(`Error: ${message}`);
                }
            } catch (error) {
                alert("Connection error: Could not reach the server.");
                console.error(error);
            }
        }
    </script>
    <script src="js/app.js"></script>
    <script src="js/verify.js"></script>
</body>
